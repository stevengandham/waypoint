<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Registration PoC</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="tel"], select { width: 100%; padding: 8px; box-sizing: border-box; }
        
        /* Grid styling for weekly availability */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .time-block { border: 1px solid #ccc; padding: 10px; text-align: center; cursor: pointer; border-radius: 4px; user-select: none; }
        .time-block.selected { background-color: #4CAF50; color: white; border-color: #4CAF50; }
        
        button { background-color: #0078d4; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 20px;}
        button:hover { background-color: #005a9e; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Community Lead Form</h2>
    <form id="leadForm">
        <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" required>
        </div>
        <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" required>
        </div>
        <div class="form-group">
            <label for="lifeGroup">Life Group Interest?</label>
            <select id="lifeGroup">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div class="form-group">
            <label>Weekly Availability (Click all that apply)</label>
            <div class="grid" id="availabilityGrid">
                </div>
        </div>

        <button type="submit">Submit Info</button>
    </form>

    <div id="status"></div>

    <script>
        // Define simple time blocks for the PoC
        const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        const blocks = ['Morning', 'Afternoon', 'Evening'];
        const grid = document.getElementById('availabilityGrid');
        const selectedSlots = new Set();

        // Build visual grid
        days.forEach(day => {
            blocks.forEach(block => {
                const slotId = `${day}-${block}`;
                const div = document.createElement('div');
                div.className = 'time-block';
                div.textContent = `${day} ${block}`;
                div.onclick = () => {
                    div.classList.toggle('selected');
                    if (selectedSlots.has(slotId)) {
                        selectedSlots.delete(slotId);
                    } else {
                        selectedSlots.add(slotId);
                    }
                };
                grid.appendChild(div);
            });
        });

        // Handle Submission
        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = "Submitting...";
            statusDiv.style.color = "black";

            const formData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                lifeGroup: document.getElementById('lifeGroup').value,
                availability: Array.from(selectedSlots).join(', ') // "Mon-Morning, Wed-Evening"
            };

            try {
                const response = await fetch('/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    statusDiv.textContent = "Success! Saved to Google Sheets.";
                    statusDiv.style.color = "green";
                    document.getElementById('leadForm').reset();
                    document.querySelectorAll('.time-block').forEach(b => b.classList.remove('selected'));
                    selectedSlots.clear();
                } else {
                    const errText = await response.text();
                    statusDiv.textContent = `Error: ${errText}`;
                    statusDiv.style.color = "red";
                }
            } catch (err) {
                statusDiv.textContent = "Network error occurred.";
                statusDiv.style.color = "red";
            }
        });
    </script>
</body>
</html>
